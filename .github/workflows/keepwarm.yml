name: keep-warm

# Pings the live demo every ~10 minutes so Render's free tier (which sleeps
# after 15 min idle) stays awake. Free, runs on GitHub's infrastructure.
# Note: GitHub may delay scheduled runs under load; for a guaranteed-warm demo,
# upgrade the Render services to a paid instance.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {} # lets you run it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: curl -s -m 90 -o /dev/null -w "backend %{http_code}\n" https://agentic-os-api.onrender.com/health || true
      - name: Ping frontend
        run: curl -s -m 90 -o /dev/null -w "frontend %{http_code}\n" https://agentic-os-frontend.onrender.com/ || true
